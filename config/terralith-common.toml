[compatibility]
# Tectonic-Kompatibilität: Terralith Biome skalieren auf die erhöhte Welthöhe.
# Lithostitched übernimmt die technische Kompatibilität zwischen beiden Mods.
betterLandmasses = true

[misc]
# Spawn in einer Wiese (Terralith Meadow) für freundlicheren Einstieg.
# Verhindert Spawn in extremen Biomen (Wüste, Eiswüste, etc.)
spawnOnPreferredBiome = true
